<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BTC Futures Simulator</title>

<style>
body {
  background: #0e0e0e;
  color: #fff;
  font-family: Arial;
  text-align: center;
}

.box {
  border: 1px solid #333;
  padding: 15px;
  margin: 10px auto;
  width: 320px;
}

.green { color: #00ff88; }
.red { color: #ff4d4d; }

</style>
</head>

<body>

<h1>BTC Futures Simulator</h1>

<div class="box">
  <h3>Precio BTC</h3>
  <p id="price">...</p>
</div>

<div class="box">
  <h3>Balance</h3>
  <p id="balance">100 €</p>
</div>

<div class="box">
  <h3>Posición</h3>
  <p id="position">Sin posición</p>
</div>

<div class="box">
  <h3>Historial</h3>
  <div id="log"></div>
</div>

<script>
let balance = 100;
let position = null;
let entryPrice = 0;
let leverage = 20;
let lastPrice = null;

function log(msg) {
  const el = document.getElementById("log");
  el.innerHTML = msg + "<br>" + el.innerHTML;
}

async function getPrice() {
  const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
  const data = await res.json();
  return parseFloat(data.price);
}

function openPosition(type, price) {
  position = type;
  entryPrice = price;

  log("🟡 Abrir " + type + " en " + price.toFixed(2));
}

function closePosition(price) {
  let pnl = 0;

  if (position === "LONG") {
    pnl = (price - entryPrice) / entryPrice * leverage;
  } else {
    pnl = (entryPrice - price) / entryPrice * leverage;
  }

  let profit = balance * pnl;
  balance += profit;

  log("🔵 Cerrar " + position + " | PnL: " + (profit).toFixed(2));

  position = null;
}

function updateUI(price) {
  document.getElementById("price").innerText = price.toFixed(2);
  document.getElementById("balance").innerText = balance.toFixed(2) + " €";
  document.getElementById("position").innerText = position || "Sin posición";
}

function strategy(price) {
  if (!lastPrice) return;

  let change = (price - lastPrice) / lastPrice * 100;

  // ENTRADAS agresivas
  if (!position) {
    if (change > 0.25) openPosition("LONG", price);
    if (change < -0.25) openPosition("SHORT", price);
  }

  // SALIDAS
  if (position) {
    let move = (price - entryPrice) / entryPrice * 100;

    if (position === "SHORT") move *= -1;

    // take profit
    if (move > 1.5) closePosition(price);

    // stop loss
    if (move < -0.7) closePosition(price);
  }
}

async function loop() {
  try {
    const price = await getPrice();

    strategy(price);
    updateUI(price);

    lastPrice = price;

  } catch (e) {
    console.log(e);
  }

  setTimeout(loop, 3000);
}

loop();
</script>

</body>
</html>
