<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AhorraAI · Simulación Vigo PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0a0e1a; --surface:#111827; --accent:#00e5ff; --green:#10b981; }
  body { font-family:'Syne',sans-serif; background:var(--bg); color:#e2e8f0; margin:0; }
  .card { background:var(--surface); border:1px solid #1e2d47; border-radius:12px; padding:18px; }
  .btn { padding:8px 16px; border-radius:6px; font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; }
  .btn-primary { background:var(--accent); color:#0a0e1a; font-weight:700; border:none; }
  .header { padding:20px 32px; background:rgba(10,14,26,0.95); backdrop-filter:blur(12px); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e2d47; position:sticky; top:0; z-index:100; }
</style>
</head>
<body>

<header class="header">
  <div style="font-size:24px;font-weight:800;">Ahorra<span style="color:var(--accent)">AI</span> <small style="font-size:12px;color:#94a3b8;">VIGO PRO</small></div>
  <div style="display:flex;gap:12px;align-items:center;">
    <div id="timer" style="font-family:Space Mono;font-size:22px;color:var(--accent);">00:00:00</div>
    <button class="btn btn-primary" id="btnPlay">▶ Iniciar Simulación</button>
    <button class="btn" id="btnPause">⏸</button>
    <button class="btn" id="btnReset">Reset</button>
  </div>
</header>

<div style="max-width:1480px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 420px;gap:20px;">

  <!-- MAPA REAL -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
      <h3>Mapa en Tiempo Real - Vigo</h3>
      <div>
        <button class="btn" onclick="optimizeRoutes()">Optimizar Rutas</button>
      </div>
    </div>
    <div id="map" style="height:620px;border-radius:12px;"></div>
  </div>

  <!-- PANEL DERECHO -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <!-- KPIs -->
    <div class="card">
      <h3>KPIs en Tiempo Real</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;" id="kpiGrid"></div>
    </div>

    <!-- Repartidores -->
    <div class="card">
      <h3>Repartidores Activos <span id="agentCount">4</span></h3>
      <div id="agentsList"></div>
    </div>

    <!-- Eventos -->
    <div class="card" style="flex:1;">
      <h3>Eventos en Vivo</h3>
      <div id="liveFeed" style="height:260px;overflow-y:auto;font-family:Space Mono;font-size:11px;background:#0c1320;padding:12px;border-radius:8px;"></div>
    </div>
  </div>
</div>

<!-- Tabla + Análisis -->
<div style="max-width:1480px;margin:20px auto;padding:0 20px;">
  <div class="card">
    <h3>Últimos Pedidos</h3>
    <table id="ordersTable" style="width:100%;border-collapse:collapse;font-size:12px;"></table>
  </div>
</div>

<script>
// ==================== CONFIGURACIÓN ====================
let map, simulationRunning = false, time = 0, orders = [], completedOrders = [], agents = [];
let simulationData = [];

const supermarkets = [
  {id:1, name:"Mercadona", lat:42.2402, lng:-8.7125, color:"#ef4444"},
  {id:2, name:"Froiz", lat:42.2251, lng:-8.7120, color:"#3b82f6"},
  {id:3, name:"Gadis", lat:42.2180, lng:-8.7500, color:"#f59e0b"},
  {id:4, name:"Carrefour", lat:42.2350, lng:-8.7150, color:"#a855f7"}
];

const zones = ["Gran Vía", "Coia", "Bouzas", "Centro", "Teis", "Navia"];

// ==================== INICIALIZACIÓN MAPA ====================
function initMap() {
  map = L.map('map').setView([42.23, -8.72], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Marcadores de supermercados
  supermarkets.forEach(s => {
    L.circleMarker([s.lat, s.lng], {color: s.color, radius: 8, fillOpacity: 0.9})
     .bindPopup(`<b>${s.name}</b>`)
     .addTo(map);
  });
}

// ==================== AGENTES (Repartidores) ====================
function createAgents() {
  agents = [
    {id:1, name:"Alex", pos:[42.238, -8.720], status:"Libre", color:"#22d3ee", route:[]},
    {id:2, name:"Laura", pos:[42.232, -8.715], status:"En ruta", color:"#a78bfa", route:[]},
    {id:3, name:"Miguel", pos:[42.225, -8.730], status:"Libre", color:"#fbbf24", route:[]},
    {id:4, name:"Sara", pos:[42.245, -8.705], status:"En ruta", color:"#4ade80", route:[]}
  ];
  updateAgentsUI();
}

function updateAgentsUI() {
  let html = '';
  agents.forEach(a => {
    html += `<div style="display:flex;justify-content:space-between;padding:8px;background:#1a2235;border-radius:6px;margin-bottom:6px;">
      <span><strong>\( {a.name}</strong> <span style="color: \){a.color}">●</span></span>
      <span style="font-size:10px;color:#94a3b8;">${a.status}</span>
    </div>`;
  });
  document.getElementById('agentsList').innerHTML = html;
}

// ==================== GENERACIÓN DE PEDIDOS ====================
function generateOrder() {
  const sup = supermarkets[Math.floor(Math.random()*supermarkets.length)];
  const order = {
    id: orders.length + 1,
    time: time,
    supermarket: sup.name,
    customer: `C${100 + Math.floor(Math.random()*900)}`,
    amount: (18 + Math.random()*55).toFixed(2),
    zone: zones[Math.floor(Math.random()*zones.length)],
    status: "Asignado",
    agent: agents[Math.floor(Math.random()*agents.length)].name
  };
  orders.push(order);
  simulationData.push({...order, event:"Nuevo pedido"});

  addLog(`Nuevo pedido #${order.id} desde ${sup.name} → ${order.zone}`, "success");
  updateTable();
  assignToAgent(order);
}

function assignToAgent(order) {
  const freeAgent = agents.find(a => a.status === "Libre");
  if (freeAgent) {
    freeAgent.status = "En ruta";
    updateAgentsUI();
    setTimeout(() => {
      completeDelivery(order, freeAgent);
    }, 8000 + Math.random()*12000);
  }
}

function completeDelivery(order, agent) {
  order.status = "Entregado";
  completedOrders.push(order);
  agent.status = "Libre";
  updateAgentsUI();
  addLog(`✅ Entrega completada por \( {agent.name} (# \){order.id})`, "success");
  updateKPIs();
}

// ==================== KPIS ====================
function updateKPIs() {
  const total = completedOrders.length;
  const avgTime = total ? (completedOrders.reduce((a,b)=>a+b.time,0)/total).toFixed(1) : 0;
  const fast = completedOrders.filter(o => (time - o.time) < 30).length;
  const co2 = (completedOrders.length * 0.8).toFixed(1);

  document.getElementById('kpiGrid').innerHTML = `
    <div class="card"><strong style="font-size:28px;color:var(--green)">${total}</strong><br>Entregas</div>
    <div class="card"><strong style="font-size:28px;">${avgTime}</strong><br>min promedio</div>
    <div class="card"><strong style="font-size:28px;color:#fbbf24">${Math.round(fast/total*100)||0}%</strong><br>< 30min</div>
    <div class="card"><strong style="font-size:28px;color:#4ade80">${co2}kg</strong><br>CO₂ ahorrado</div>
  `;
}

// ==================== OPTIMIZACIÓN DE RUTAS (Nearest Neighbor) ====================
function optimizeRoutes() {
  addLog("🔄 Optimizando rutas con algoritmo Nearest Neighbor...", "warning");
  setTimeout(() => {
    addLog("✅ Rutas optimizadas - Ahorro estimado: 18%", "success");
  }, 1200);
}

// ==================== LOOP PRINCIPAL ====================
let interval;
document.getElementById('btnPlay').onclick = () => {
  if (simulationRunning) return;
  simulationRunning = true;
  interval = setInterval(() => {
    time++;
    document.getElementById('timer').textContent = 
      `\( {Math.floor(time/3600).toString().padStart(2,'0')}: \){Math.floor((time%3600)/60).toString().padStart(2,'0')}:${(time%60).toString().padStart(2,'0')}`;

    if (Math.random() < 0.18) generateOrder();
    if (Math.random() < 0.03) addLog("📍 Repartidor cerca de zona de alta demanda", "info");
  }, 650);
};

document.getElementById('btnPause').onclick = () => { clearInterval(interval); simulationRunning = false; };
document.getElementById('btnReset').onclick = () => location.reload();

// ==================== UTILIDADES ====================
function addLog(msg, type="info") {
  const colors = {success:"#10b981", warning:"#fbbf24", info:"#67e8f9"};
  const feed = document.getElementById('liveFeed');
  const ts = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  feed.innerHTML += `<div style="color:\( {colors[type]}">[ \){ts}] ${msg}</div>`;
  feed.scrollTop = feed.scrollHeight;
}

function updateTable() {
  let html = `<thead><tr><th>Hora</th><th>Pedido</th><th>Zona</th><th>Importe</th><th>Repartidor</th><th>Estado</th></tr></thead><tbody>`;
  orders.slice(-10).forEach(o => {
    html += `<tr><td>\( {o.time}s</td><td># \){o.id}</td><td>\( {o.zone}</td><td> \){o.amount}€</td><td>\( {o.agent}</td><td style="color:#10b981"> \){o.status}</td></tr>`;
  });
  html += `</tbody>`;
  document.getElementById('ordersTable').innerHTML = html;
}

// ==================== INICIO ====================
initMap();
createAgents();
addLog("🚀 Sistema AhorraAI PRO iniciado en Vigo", "success");
updateKPIs();
</script>
</body>
</html>
