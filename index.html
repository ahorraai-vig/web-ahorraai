<body>

<h1>🛒 AhorraAI Vigo</h1>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar producto...">
  <select id="category">
    <option value="">Todas las categorías</option>
  </select>
</div>

<div class="grid" id="products"></div>

<script>
const SHEET_ID = "TU_SHEET_ID";
const API_KEY = "TU_API_KEY"; // opcional si usas API pública

// URL pública de Google Sheets (CSV)
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let productos = [];

async function cargarDatos() {
  const res = await fetch(URL);
  const text = await res.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  productos = rows.map(r => ({
    nombre: r.c[0]?.v || "",
    precio: r.c[1]?.v || "",
    precio_anterior: r.c[2]?.v || "",
    descuento: r.c[3]?.v || "",
    categoria: r.c[4]?.v || "",
    url: r.c[5]?.v || ""
  }));

  cargarCategorias();
  render(productos);
}

function cargarCategorias() {
  const categorias = [...new Set(productos.map(p => p.categoria))];
  const select = document.getElementById("category");

  categorias.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

function render(lista) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  lista.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.nombre}</h3>
      <div class="price">${p.precio} €</div>
      ${p.precio_anterior ? `<div class="old-price">${p.precio_anterior} €</div>` : ""}
      ${p.descuento ? `<div class="discount">-${p.descuento}%</div>` : ""}
      <div>${p.categoria}</div>
      <a href="${p.url}" target="_blank">Ver producto</a>
    `;

    container.appendChild(div);
  });
}

function filtrar() {
  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("category").value;

  const filtrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(search) &&
    (category === "" || p.categoria === category)
  );

  render(filtrados);
}

document.getElementById("search").addEventListener("input", filtrar);
document.getElementById("category").addEventListener("change", filtrar);

cargarDatos();
</script>

</body>
